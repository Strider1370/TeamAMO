server {
  server_name projectamo.co.kr www.projectamo.co.kr;

  location /slide/ {
    alias /usr/share/nginx/html/slide/;
    try_files $uri $uri/ /slide/index.html;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/projectamo.co.kr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/projectamo.co.kr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.projectamo.co.kr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = projectamo.co.kr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

  listen 80;
  server_name projectamo.co.kr www.projectamo.co.kr;
    return 404; # managed by Certbot
}
